<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, sans-serif;
      gap: 24px;
    }
    p {
      color: #94A3B8;
      font-size: 15px;
    }
    button {
      background: #4F46E5;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      font-family: -apple-system, sans-serif;
      cursor: pointer;
    }
    #error { color: #EF4444; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <p>Ready to connect your account</p>
  <button id="btn" onclick="openPlaid()">Connect with Plaid</button>
  <p id="error"></p>

  <script src="https://cdn.plaid.com/link/v2/stable/link.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    var handler = null;

    if (!token) {
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').innerText = 'Missing token.';
      document.getElementById('btn').style.display = 'none';
    } else {
      handler = Plaid.create({
        token: token,
        onSuccess: function(publicToken, metadata) {
          var institution = metadata.institution ? encodeURIComponent(metadata.institution.name) : 'Unknown';
          window.location.href = 'chamarr-finance://plaid-success?public_token=' + publicToken + '&institution=' + institution;
        },
        onExit: function(err) {
          window.location.href = 'chamarr-finance://plaid-exit';
        }
      });
    }

    function openPlaid() {
      if (handler) handler.open();
    }
  </script>
</body>
</html>
